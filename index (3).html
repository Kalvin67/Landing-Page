<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VORTEX X Pro — Gaming Mouse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#080808; --surface:#101010; --card:#141414; --border:#1f1f1f; --muted:#2e2e2e;
      --text:#f0ece8; --text-dim:#666666;
      --accent:#dc2626; --accent-dk:#b91c1c; --accent-glow:rgba(220,38,38,.12);
      --ff-display:'Bebas Neue',sans-serif; --ff-body:'Nunito',sans-serif; --ff-mono:'JetBrains Mono',monospace;
    }
    html { scroll-behavior: smooth; }
    body { background:var(--bg); color:var(--text); font-family:var(--ff-body); font-size:16px; overflow-x:hidden; }
    ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:var(--bg)} ::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}
    .container{max-width:1200px;margin:0 auto;padding:0 2rem}
    .tag{font-family:var(--ff-mono);font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-dim)}
    .section-header{margin-bottom:4rem} .section-header .tag{display:block;margin-bottom:.75rem}
    .section-header h2{font-family:var(--ff-display);font-size:clamp(3rem,6vw,5.5rem);line-height:.93}
    .section-header p{color:var(--text-dim);font-weight:300;max-width:480px;margin-top:1rem;line-height:1.8}
    .btn-primary{display:inline-block;background:var(--accent);color:#fff;border:none;padding:1rem 2.2rem;font-family:var(--ff-mono);font-size:.76rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;cursor:pointer;transition:background .2s,transform .15s}
    .btn-primary:hover{background:var(--accent-dk);transform:translateY(-2px)}
    .btn-ghost{display:inline-block;background:transparent;color:var(--text);border:1px solid var(--muted);padding:1rem 2.2rem;font-family:var(--ff-mono);font-size:.76rem;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;cursor:pointer;transition:border-color .2s,color .2s}
    .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes float{0%,100%{transform:translateY(0) rotate(-1.5deg)}50%{transform:translateY(-16px) rotate(-1.5deg)}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
    .reveal{opacity:0;transform:translateY(30px);transition:opacity .7s ease,transform .7s ease}
    .reveal.visible{opacity:1;transform:translateY(0)}
    section{scroll-margin-top:80px}

    /* ═══ NAV ═══════════════════════════════════ */
    nav {
      position: fixed; top:0; left:0; right:0; z-index:100;
      display: flex; align-items:center; justify-content:space-between;
      padding: 1.2rem 2.5rem;
      background: rgba(8,8,8,0.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      transition: padding .3s ease;
    }
    nav.scrolled { padding: .75rem 2.5rem; }

    .nav-logo {
      font-family: var(--ff-display);
      font-size: 1.9rem; letter-spacing:.08em;
      color: var(--text); text-decoration:none;
    }
    .nav-logo span { color: var(--accent); }

    .nav-links { display:flex; gap:2.5rem; list-style:none; }
    .nav-links a {
      color:var(--text-dim); text-decoration:none;
      font-family:var(--ff-mono); font-size:.72rem;
      letter-spacing:.1em; text-transform:uppercase; transition:color .2s;
    }
    .nav-links a:hover { color:var(--accent); }

    .nav-cta {
      background:var(--accent); color:#fff; border:none;
      padding:.6rem 1.4rem; font-family:var(--ff-mono);
      font-size:.7rem; font-weight:500; letter-spacing:.1em;
      text-transform:uppercase; cursor:pointer; transition:background .2s;
    }
    .nav-cta:hover { background:var(--accent-dk); }

    /* Hamburger */
    .hamburger {
      display:none; flex-direction:column; gap:5px;
      background:none; border:none; padding:4px; cursor:pointer;
    }
    .hamburger span {
      display:block; width:24px; height:2px; background:var(--text);
      transition:transform .3s, opacity .3s;
    }
    .hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
    .hamburger.open span:nth-child(2){opacity:0}
    .hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

    /* Mobile fullscreen menu */
    .mobile-menu {
      display:none; position:fixed; inset:0; background:var(--bg); z-index:99;
      flex-direction:column; align-items:center; justify-content:center;
      gap:2.5rem; opacity:0; pointer-events:none; transition:opacity .3s;
    }
    .mobile-menu.active { opacity:1; pointer-events:all; }
    .mobile-menu a {
      font-family:var(--ff-display); font-size:3.5rem;
      letter-spacing:.06em; color:var(--text); text-decoration:none; transition:color .2s;
    }
    .mobile-menu a:hover, .mobile-menu a.cta { color:var(--accent); }

    @media(max-width:768px){
      nav{padding:1rem 1.5rem}
      .nav-links,.nav-cta{display:none}
      .hamburger{display:flex}
      .mobile-menu{display:flex}
      .container{padding:0 1.5rem}
    }
  </style>
</head>
<body>

  <!-- ═══ NAV ════════════════════════════════════ -->
  <nav id="navbar">
    <a href="#hero" class="nav-logo">VORT<span>E</span>X</a>
    <ul class="nav-links">
      <li><a href="#features">Features</a></li>
      <li><a href="#interactive">Explore</a></li>
      <li><a href="#specs">Specs</a></li>
    </ul>
    <button class="nav-cta" onclick="document.getElementById('specs').scrollIntoView({behavior:'smooth'})">
      Order Now
    </button>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Mobile menu -->
  <div class="mobile-menu" id="mobileMenu">
    <a href="#features"    class="mobile-nav-link">Features</a>
    <a href="#interactive" class="mobile-nav-link">Explore</a>
    <a href="#specs"       class="mobile-nav-link">Specs</a>
    <a href="#specs"       class="mobile-nav-link cta">Order Now</a>
  </div>

  <!-- ═══ CONTENT PLACEHOLDERS ═══════════════════ -->
  <main>
    <section id="hero" style="min-height:100vh;padding:120px 2rem 4rem;display:flex;align-items:center;">
      <div class="container"><span class="tag">Hero section — next commit</span></div>
    </section>
    <div id="stats" style="padding:2rem 0;border-top:1px solid var(--border);">
      <div class="container"><span class="tag">Stats — coming soon</span></div>
    </div>
    <section id="features" style="padding:6rem 0;">
      <div class="container"><span class="tag">Features — coming soon</span></div>
    </section>
    <section id="interactive" style="padding:6rem 0;background:var(--surface);">
      <div class="container"><span class="tag">Interactive — coming soon</span></div>
    </section>
    <section id="specs" style="padding:6rem 0;">
      <div class="container"><span class="tag">Specs — coming soon</span></div>
    </section>
  </main>
  <footer style="padding:2rem 0;border-top:1px solid var(--border);">
    <div class="container"><span class="tag">Footer — coming soon</span></div>
  </footer>

  <script>
    /* Shrink nav on scroll */
    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', () => navbar.classList.toggle('scrolled', window.scrollY > 60));

    /* Hamburger toggle */
    const hamburger  = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    hamburger.addEventListener('click', () => {
      const open = hamburger.classList.toggle('open');
      mobileMenu.classList.toggle('active', open);
      document.body.style.overflow = open ? 'hidden' : '';
    });
    document.querySelectorAll('.mobile-nav-link').forEach(l =>
      l.addEventListener('click', () => {
        hamburger.classList.remove('open');
        mobileMenu.classList.remove('active');
        document.body.style.overflow = '';
      })
    );
  </script>
</body>
</html>
